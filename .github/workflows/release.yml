name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options: [patch, minor, major]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: latest_tag
        run: |
          TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          echo "tag=${TAG:-v0.0.0}" >> "$GITHUB_OUTPUT"

      - name: Check for new commits since last tag
        id: has_commits
        run: |
          TAG="${{ steps.latest_tag.outputs.tag }}"
          COUNT=$(git rev-list "${TAG}..HEAD" --count 2>/dev/null || echo "1")
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"

      - name: Determine bump type from conventional commits
        id: bump_type
        if: github.event_name == 'push' && steps.has_commits.outputs.count != '0'
        run: |
          TAG="${{ steps.latest_tag.outputs.tag }}"
          COMMITS=$(git log "${TAG}..HEAD" --pretty=format:"%s" 2>/dev/null)
          if echo "$COMMITS" | grep -qE '^(feat|fix|refactor|perf)(\(.+\))?!:|^BREAKING CHANGE'; then
            echo "bump=major" >> "$GITHUB_OUTPUT"
          elif echo "$COMMITS" | grep -qE '^feat(\(.+\))?:'; then
            echo "bump=minor" >> "$GITHUB_OUTPUT"
          else
            echo "bump=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve bump type (manual override wins)
        id: resolved_bump
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "bump=${{ inputs.bump }}" >> "$GITHUB_OUTPUT"
          else
            echo "bump=${{ steps.bump_type.outputs.bump }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next version
        id: next_version
        if: steps.has_commits.outputs.count != '0'
        run: |
          TAG="${{ steps.latest_tag.outputs.tag }}"
          VERSION="${TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          case "${{ steps.resolved_bump.outputs.bump }}" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac
          echo "version=v${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"

      - name: Skip — no new commits since last tag
        if: steps.has_commits.outputs.count == '0'
        run: echo "No new commits since ${{ steps.latest_tag.outputs.tag }} — skipping release."

      - name: Generate changelog
        id: changelog
        if: steps.has_commits.outputs.count != '0'
        run: |
          TAG="${{ steps.latest_tag.outputs.tag }}"
          NEXT="${{ steps.next_version.outputs.version }}"
          LOG=$(git log "${TAG}..HEAD" --pretty=format:"- %s (%h)" 2>/dev/null)
          {
            echo "body<<EOF"
            echo "## What's changed in ${NEXT}"
            echo ""
            echo "${LOG}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create tag and GitHub release
        if: steps.has_commits.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEXT="${{ steps.next_version.outputs.version }}"
          git tag "$NEXT"
          git push origin "$NEXT"
          gh release create "$NEXT" \
            --title "$NEXT" \
            --notes "${{ steps.changelog.outputs.body }}"
